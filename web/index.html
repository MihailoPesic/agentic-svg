<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agentic-svg</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23161616'/><path d='M28 30h44M28 50h30M28 70h38' stroke='%237aa2c8' stroke-width='8' stroke-linecap='round'/></svg>" />
</head>
<body>
  <header class="bar">
    <span class="name">agentic-svg</span>
    <span class="sep"></span>
    <span class="note">trace, render, measure, refine</span>
    <span class="spacer"></span>
    <span class="health"><i id="dot"></i><span id="healthText">checking</span></span>
  </header>

  <main>
    <!-- left rail: input + controls -->
    <section class="rail">
      <label class="drop" id="drop">
        <input type="file" id="file" accept="image/*" hidden />
        <span class="drop-main">drop / click / paste an image</span>
        <span class="drop-sub">png, jpg, webp</span>
      </label>

      <div class="row">
        <span class="lbl">quality</span>
        <div class="seg" id="quality">
          <button data-q="draft" type="button">draft</button>
          <button data-q="balanced" type="button" class="on">balanced</button>
          <button data-q="high" type="button">high</button>
          <button data-q="max" type="button">max</button>
        </div>
      </div>
      <div class="qhint" id="qhint">good fidelity, compact file, ~3s</div>

      <div class="row">
        <span class="lbl">samples</span>
        <div class="chips" id="samples">
          <button class="chip" type="button" data-sample="/samples/logo.png">logo</button>
          <button class="chip" type="button" data-sample="/samples/gradient.png">gradient</button>
          <button class="chip" type="button" data-sample="/samples/orb.png">orb</button>
          <button class="chip" type="button" data-sample="/samples/photo.png">photo</button>
          <button class="chip" type="button" data-sample="/samples/ui.png">ui</button>
          <button class="chip" type="button" data-sample="/samples/bar-chart.png">bar-chart</button>
          <button class="chip" type="button" data-sample="/samples/world-map.png">world-map</button>
        </div>
      </div>

      <button id="run" class="run" type="button" disabled>convert</button>

      <div class="acts" id="acts" hidden>
        <button id="download" class="act" type="button">download</button>
        <button id="copy" class="act" type="button">copy</button>
        <button id="compareBtn" class="act" type="button" aria-pressed="false">compare</button>
      </div>
    </section>

    <!-- panels: original + result -->
    <section class="panels">
      <figure class="panel" id="origPanel">
        <figcaption><span>original</span><span class="meta" id="origMeta">—</span></figcaption>
        <div class="view">
          <img id="origImg" alt="original" hidden />
          <span class="empty" id="origEmpty">no image loaded</span>
        </div>
      </figure>

      <figure class="panel">
        <figcaption><span>svg</span><span class="meta" id="resMeta">idle</span></figcaption>
        <div class="view checker">
          <div class="cmp" id="cmp">
            <div id="resHolder"></div>
            <div class="cmp-before" id="cmpBefore" hidden><img id="cmpImg" alt="original" /></div>
            <div class="cmp-handle" id="cmpHandle" hidden role="slider" aria-label="Reveal original" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
              <span class="cmp-line"></span>
            </div>
          </div>
          <span class="empty" id="resEmpty">result renders here</span>
        </div>
      </figure>
    </section>
  </main>

  <!-- status / stats strip -->
  <footer class="strip">
    <div class="prog"><div class="prog-fill" id="progFill"></div></div>
    <span class="phase" id="phase">ready</span>
    <span class="stats" id="stats"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
